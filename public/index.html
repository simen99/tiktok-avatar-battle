<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rusia vs NATO - Avatar Battle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 540px;
            max-height: 960px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9 / 16; /* Mengunci rasio 9:16 */
            object-fit: contain;  /* Jaminan visual utuh, tidak akan terpotong pada layar tinggi */
            display: block;
            background-color: #000;
        }
        /* Panel admin yang bisa digeser (draggable) */
        #admin-panel {
            position: absolute;
            top: 130px; 
            left: 15px;
            background: rgba(10, 10, 10, 0.95);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 11px;
            z-index: 999;
            border: 2px solid #e67e22;
            width: 180px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            user-select: none;
            touch-action: none;
        }
        #admin-header {
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            color: #e67e22;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            cursor: move;
        }
        #admin-panel input, #admin-panel button {
            font-size: 11px;
            padding: 6px;
            margin-top: 5px;
            border-radius: 4px;
            border: none;
            width: 100%;
        }
        #connectBtn {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #toggleAdminBtn {
            background-color: #34495e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Panel Kontrol HP Draggable -->
        <div id="admin-panel">
            <div id="admin-header">⚡ GESER PANEL DISINI ⚡</div>
            <div id="admin-content">
                <label for="streamerUsername">Hubungkan Live TikTok:</label>
                <input type="text" id="streamerUsername" placeholder="Username (tanpa @)">
                <button id="connectBtn">Hubungkan</button>
                <div id="status" style="margin-top: 5px; color: #ffeb3b; text-align: center;">Belum Terhubung</div>
            </div>
            <button id="toggleAdminBtn">Sembunyikan Panel</button>
        </div>

        <canvas id="gameCanvas" width="540" height="960"></canvas>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
