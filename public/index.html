<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Avatar Battle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 450px;
            height: 800px;
            background: #222;
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Panel admin di kiri atas untuk memasukkan username live */
        #admin-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px;
            border-radius: 5px;
            color: white;
            font-size: 11px;
            z-index: 10;
            border: 1px solid #444;
        }
        #admin-panel input, #admin-panel button {
            font-size: 11px;
            padding: 3px;
            margin-top: 3px;
            border-radius: 3px;
            border: none;
        }
        #connectBtn {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Panel Admin untuk Hubungkan Akun TikTok -->
        <div id="admin-panel">
            <label for="streamerUsername">Hubungkan Live TikTok:</label><br>
            <input type="text" id="streamerUsername" placeholder="Username (tanpa @)">
            <button id="connectBtn">Hubungkan</button>
            <div id="status" style="margin-top: 5px; color: #ffeb3b;">Belum Terhubung</div>
        </div>

        <canvas id="gameCanvas" width="540" height="960"></canvas>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
