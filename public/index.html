<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok Avatar Battle (Mobile Mode)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #222;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Membuat game memenuhi layar HP */
        }
        /* Panel admin yang fleksibel untuk HP */
        #admin-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            z-index: 10;
            border: 1px solid #444;
            max-width: 200px;
        }
        #admin-panel input, #admin-panel button {
            font-size: 12px;
            padding: 6px;
            margin-top: 5px;
            border-radius: 4px;
            border: none;
            width: 100%;
        }
        #connectBtn {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #toggleAdminBtn {
            background-color: #34495e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Panel Kontrol HP -->
        <div id="admin-panel">
            <div id="admin-content">
                <label for="streamerUsername">Hubungkan Live TikTok:</label>
                <input type="text" id="streamerUsername" placeholder="Username (tanpa @)">
                <button id="connectBtn">Hubungkan</button>
                <div id="status" style="margin-top: 5px; color: #ffeb3b; text-align: center;">Belum Terhubung</div>
            </div>
            <!-- Tombol untuk menyembunyikan panel input saat live dimulai -->
            <button id="toggleAdminBtn">Sembunyikan Panel</button>
        </div>

        <canvas id="gameCanvas" width="540" height="960"></canvas>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
